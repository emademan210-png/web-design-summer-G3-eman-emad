<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Card</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montenegrin+Gothic+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="flip-card perspective">

    <div class="card-inner">

        <!-- Front -->
        <div class="card-front">

            <img src="building.jpg" alt="building">

            <div class="overlay">
                <h2>Financial Sector Development</h2>
            </div>

        </div>

        <!-- Back -->
        <div class="card-back">

            <h2>Financial Sector Development Program</h2>

            <p>
                The Program aims to develop a diversified
                financial sector to support the development
                of the Saudi Arabia's economy.
            </p>

            <a href="#">Read More</a>

        </div>

    </div>

    </div>

</body>

</html>
