<html>
<head>
    <title>Register Form</title>
</head>

<body>

<form>
    <fieldset>
        <legend>Register Form</legend>

        <label>First Name</label>
        <input type="text" name="first_name" maxlength="5" pattern="[A-Za-z]+" placeholder="Enter first name" required>
        <br><br>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter email" required>
        <br><br>

        <label>Phone</label>
        <input type="text" name="phone" maxlength="11" pattern="01[0125][0-9]{8}" placeholder="Enter phone number" required>
        <br><br>

        <label>Image</label>
        <input type="file" name="image" accept=".png" required>
        <br><br>

        <label>Courses</label>
        <input list="courses" name="courses" placeholder="Choose course">

        <datalist id="courses">
            <option value="HTML">
            <option value="CSS">
            <option value="JavaScript">
            <option value="PHP">
            <option value="Python">
        </datalist>
        <br><br>

        <label>Date</label>
        <input type="date" name="date" required>
        <br><br>

        <label>Comment</label>
        <input type="text" name="comment" pattern="[A-Za-z ]+" placeholder="Enter comment" required>
        <br><br>

        <label>Range</label>
        <input type="range" name="range" min="100" max="200">
        <br><br>

        <label>Gender</label>
        <input type="radio" name="gender" value="male" checked> Male
        <input type="radio" name="gender" value="female"> Female
        <br><br>

        <label>Tracks</label>
        <br>
        <input type="checkbox" name="tracks" value="frontend"> Frontend
        <br>
        <input type="checkbox" name="tracks" value="backend"> Backend
        <br>
        <input type="checkbox" name="tracks" value="fullstack"> Fullstack
        <br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </fieldset>
</form>

</body>
</html>
